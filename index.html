      /* Preloader / NoScript Fallback */
      #root:empty ~ .loading-screen {
        display: flex;
      }

      .loading-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;

        background: #ffffff;

        align-items: center;

        width: 80px;

        margin-bottom: 20px;

      }

      .loading-text {
        font-family: "Poppins", sans-serif;
        font-size: 18px;
        color: #e09c27;
        font-weight: 500;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }

      /* Image Lazy Loading Placeholder */
      img[loading="lazy"] {
        background: linear-gradient(
          90deg,
          #f0f0f0 25%,
          #e0e0e0 50%,
          #f0f0f0 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
